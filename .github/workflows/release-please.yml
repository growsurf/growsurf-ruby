name: Release Please

# Opens/updates a release PR as conventional-commit changes land on main, and
# creates the GitHub release + tag when that PR is merged. The release
# `published` event then triggers Publish Gem. Replaces the retired Stainless
# release pipeline (uses the existing release-please-config.json + manifest).

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    if: github.repository == 'growsurf/growsurf-ruby'
    runs-on: ubuntu-latest
    steps:
      - name: Run release-please
        uses: googleapis/release-please-action@v4
        with:
          # A PAT (RELEASE_PLEASE_TOKEN) lets the created release trigger Publish Gem;
          # without it, GITHUB_TOKEN still opens the PR and cuts the release, but you
          # must run Publish Gem manually (workflow_dispatch).
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
